[pytest]
# Pytest configuration for TODO API tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --cov=app
    --cov=models
    --cov=database
    --cov-report=term-missing
    --cov-report=html
    --cov-fail-under=90

# Test paths
testpaths = .

# Markers
markers =
    integration: Integration tests
    unit: Unit tests
    edge_case: Edge case tests

# Coverage options
[coverage:run]
source = .
omit = 
    test_*.py
    */__pycache__/*
    */venv/*
    */env/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

