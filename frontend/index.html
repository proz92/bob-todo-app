<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📝 Todo App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1 class="header-title">
                <span class="header-icon">📝</span>
                Todo App
            </h1>
            <p class="header-subtitle">Organize your tasks efficiently</p>
        </header>

        <!-- Add Todo Form -->
        <section class="add-todo-section">
            <form id="todoForm" class="todo-form">
                <div class="form-group">
                    <input 
                        type="text" 
                        id="todoTitle" 
                        class="form-input" 
                        placeholder="What needs to be done?"
                        required
                        autocomplete="off"
                    >
                </div>
                <div class="form-group">
                    <textarea 
                        id="todoDescription" 
                        class="form-textarea" 
                        placeholder="Add a description (optional)"
                        rows="3"
                    ></textarea>
                </div>
                <button type="submit" class="btn btn-primary">
                    <span class="btn-icon">➕</span>
                    Add Todo
                </button>
            </form>
        </section>

        <!-- Todos List Section -->
        <section class="todos-section">
            <!-- Loading State -->
            <div id="loadingState" class="loading-state hidden">
                <div class="spinner"></div>
                <p>Loading todos...</p>
            </div>

            <!-- Error State -->
            <div id="errorState" class="error-state hidden">
                <div class="error-icon">⚠️</div>
                <h3>Oops! Something went wrong</h3>
                <p id="errorMessage">Failed to load todos</p>
                <button id="retryBtn" class="btn btn-secondary">
                    <span class="btn-icon">🔄</span>
                    Retry
                </button>
            </div>

            <!-- Empty State -->
            <div id="emptyState" class="empty-state hidden">
                <div class="empty-icon">📭</div>
                <h3>No todos yet</h3>
                <p>Add your first todo to get started!</p>
            </div>

            <!-- Todos List -->
            <div id="todosList" class="todos-list"></div>
        </section>

        <!-- Footer -->
        <footer class="footer">
            <p>Made with ❤️ by Bob</p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
